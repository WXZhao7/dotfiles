$font = Monospace

general {
    hide_cursor = true
}

animations {
    enabled = true
    bezier = ease, 0.25, 0.1, 0.25, 1.0
    animation = fadeIn, 1, 4, ease
    animation = fadeOut, 1, 4, ease
    animation = inputFieldDots, 1, 2, ease
}

background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 8
    noise = 0.0117
    contrast = 0.95
    brightness = 0.62
    vibrancy = 0.18
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.26
    dots_spacing = 0.64
    dots_center = true
    dots_rounding = -1
    rounding = 22
    fade_on_empty = true
    inner_color = rgba(18, 22, 26, 0.36)
    outer_color = rgba(245, 247, 250, 0.22)
    font_color = rgba(245, 247, 250, 0.86)
    fail_color = rgba(255, 107, 107, 0.82)
    check_color = rgba(121, 192, 255, 0.70)
    placeholder_text = <i>Password...</i>
    fail_text = $PAMFAIL
    position = 0, 120
    halign = center
    valign = bottom
}

label {
    monitor =
    text = $TIME
    font_family = $font
    font_size = 92
    color = rgba(245, 247, 250, 0.96)
    shadow_passes = 2
    shadow_size = 3
    shadow_color = rgba(0, 0, 0, 0.45)
    position = 0, 42
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%Y-%m-%d  %A"
    font_family = $font
    font_size = 24
    color = rgba(229, 236, 243, 0.92)
    shadow_passes = 2
    shadow_size = 2
    shadow_color = rgba(0, 0, 0, 0.42)
    position = 0, -42
    halign = center
    valign = center
}
